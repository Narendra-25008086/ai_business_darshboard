<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Drawing Pro Mode Switch</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<div id="ui">
    <button id="startBtn" onclick="toggleCamera()">Start Camera</button>
    <button id="clearBtn" onclick="clearCanvas()">Clear</button>
    <button id="colorBtn" onclick="changeColor()">Color</button>
    <button id="modeBtn" onclick="toggleMode()">AI Mode ON</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="script.js"></script>

</body>
